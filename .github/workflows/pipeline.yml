# ==============================================================================
# .github/workflows/pipeline.yml
# Secure CI/CD pipeline for Terraform IaC
# Auth: OIDC (no static credentials)
# Stages: validate → plan → apply (dev auto, prod manual)
# ==============================================================================

name: Terraform CI/CD

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

permissions:
  id-token: write   # Required for OIDC
  contents: read

env:
  TF_VERSION: "1.6.0"
  AWS_REGION: "us-east-1"
  WORKING_DIR: "environments/dev"
  AWS_ROLE_ARN: "arn:aws:iam::474945406391:role/github-actions-vpc-security"

jobs:
  # ----------------------------------------------------------------------------
  # JOB 1 — Validate: fmt + validate (runs on every push and PR)
  # ----------------------------------------------------------------------------
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Terraform Format Check
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

  # ----------------------------------------------------------------------------
  # JOB 2 — Plan: show changes before applying (runs on every push and PR)
  # ----------------------------------------------------------------------------
  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Terraform Plan
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform plan -var="allowed_ssh_cidr=${{ secrets.ALLOWED_SSH_CIDR }}"

  # ----------------------------------------------------------------------------
  # JOB 3 — Apply: only on push to main (not on PRs)
  # ----------------------------------------------------------------------------
  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform apply -auto-approve -var="allowed_ssh_cidr=${{ secrets.ALLOWED_SSH_CIDR }}"
